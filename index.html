<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG QLGG - BMK CENTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #12181B; --card: #1E272E; --text: #ECF0F1; --accent: #00A8FF; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        .sidebar { background: var(--card); border-right: 1px solid #333; width: 240px; height: 100vh; position: fixed; padding: 15px; }
        .main-view { margin-left: 240px; padding: 30px; width: calc(100% - 240px); }
        .nav-link { color: #bdc3c7; padding: 12px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        .module-page { display: none; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #444; }
        .module-page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .field-wrapper { display: none; margin-bottom: 10px; }
        .form-label { font-size: 13px; color: var(--accent); font-weight: bold; }
        .form-control { background: #2c3e50; border: 1px solid #444; color: white; }
        #preview-img { max-width: 100%; border: 3px solid #333; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center text-warning mb-4">QLGG CENTER</h4>
    <div class="nav flex-column">
        <div class="nav-link active" onclick="switchTab('home')">🏠 TRANG CHỦ</div>
        <div class="nav-link" onclick="switchTab('ghep-anh')">🖼️ GHÉP ẢNH (3.0)</div>
        <div class="nav-link" onclick="switchTab('data-form', 'LẬP HỒ SƠ')">📝 LẬP HỒ SƠ</div>
        <div class="nav-link" onclick="switchTab('data-form', 'CHUYỂN TRẠI')">🚚 CHUYỂN TRẠI</div>
        <div class="nav-link" onclick="switchTab('data-form', 'THI HÀNH ÁN')">⚖️ THI HÀNH ÁN</div>
    </div>
</div>

<div class="main-view">
    <div id="home" class="module-page active">
        <h2>HỆ THỐNG ĐÃ SẴN SÀNG</h2>
        <hr>
        <p>Nếu bạn thấy thông báo này, JavaScript giao diện đang hoạt động tốt.</p>
    </div>

    <div id="ghep-anh" class="module-page">
        <h4>🖼️ GHÉP ẢNH 3.0</h4>
        <div class="row">
            <div class="col-md-5">
                <label class="form-label">Chọn 3 ảnh</label>
                <input type="file" id="f1" class="form-control mb-2">
                <input type="file" id="f2" class="form-control mb-2">
                <input type="file" id="f3" class="form-control mb-2">
                <label class="form-label">Số hiệu - Họ tên</label>
                <input type="text" id="ga-txt" class="form-control mb-3">
                <button onclick="doGhepAnh()" class="btn btn-primary w-100 mb-2">TẠO ẢNH</button>
                <button onclick="saveImage()" class="btn btn-success w-100">💾 LƯU ẢNH</button>
            </div>
            <div class="col-md-7 text-center">
                <canvas id="canvas" style="display:none"></canvas>
                <img id="preview-img" src="" alt="Kết quả">
            </div>
        </div>
    </div>

    <div id="data-form" class="module-page">
        <h4 id="form-title">NHẬP LIỆU</h4>
        <div class="row g-2">
            <div class="col-md-4 field-wrapper" id="w-b7"><label class="form-label">Họ tên (B7/C7)</label><input type="text" id="b7" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c8"><label class="form-label">Tên khác (C8)</label><input type="text" id="c8" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c9"><label class="form-label">Ngày sinh (C9)</label><input type="text" id="c9" class="form-control"></div>
            <div class="col-md-8 field-wrapper" id="w-b11"><label class="form-label">HKTT (B11/C11)</label><input type="text" id="b11" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-e9"><label class="form-label">Mức án (E9)</label><input type="text" id="e9" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-e12"><label class="form-label">Số hiệu (E12)</label><input type="text" id="e12" class="form-control"></div>
            <div class="col-md-12 field-wrapper" id="w-c13"><label class="form-label">Tội danh (C13)</label><input type="text" id="c13" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c15"><label class="form-label">Số lệnh (C15)</label><input type="text" id="c15" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-d25"><label class="form-label">QĐ THA (D25)</label><input type="text" id="d25" class="form-control"></div>
            
            <div class="col-md-2 field-wrapper" id="w-b19"><label class="form-label">B19</label><input type="text" id="b19" class="form-control"></div>
            <div class="col-md-2 field-wrapper" id="w-g21"><label class="form-label">G21</label><input type="text" id="g21" class="form-control"></div>
            
            <div class="col-md-12 mt-4">
                <div class="p-3 border border-info rounded">
                    <label class="form-label text-white">Chọn File Mẫu Excel (.xlsm)</label>
                    <div class="input-group">
                        <input type="file" id="xl-tpl" class="form-control">
                        <button onclick="exportExcel()" class="btn btn-info">XUẤT FILE</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<script>
    // Định nghĩa các trường cho từng module theo AutoIt
    const config = {
        'LẬP HỒ SƠ': ['b7','c8','c9','b11','e9','c13','c15'],
        'CHUYỂN TRẠI': ['b7','c8','c9','b11','e9','e12','c13','c15','b19','g21'],
        'THI HÀNH ÁN': ['b7','c8','c9','b11','e9','e12','c13','c15','d25']
    };

    let activeMod = "";

    function switchTab(tabId, modName) {
        // 1. Ẩn hiện trang
        document.querySelectorAll('.module-page').forEach(p => p.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        
        // 2. Highlight menu
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');

        // 3. Xử lý Form nếu là module nhập liệu
        if(tabId === 'data-form') {
            activeMod = modName;
            document.getElementById('form-title').innerText = modName;
            document.querySelectorAll('.field-wrapper').forEach(w => w.style.display = 'none');
            config[modName].forEach(f => {
                const el = document.getElementById('w-' + f);
                if(el) el.style.display = 'block';
            });
        }
    }

    async function doGhepAnh() {
        const can = document.getElementById('canvas'), ctx = can.getContext('2d');
        const txt = document.getElementById('ga-txt').value;
        const f1 = document.getElementById('f1').files[0], f2 = document.getElementById('f2').files[0], f3 = document.getElementById('f3').files[0];
        
        if(!f1 || !f2 || !f3) return alert("Chọn đủ 3 ảnh!");

        can.width = 1181; can.height = 1772;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,1181,1772);

        const loadImg = (file) => new Promise(res => {
            const r = new FileReader();
            r.onload = e => { const img = new Image(); img.onload = () => res(img); img.src = e.target.result; };
            r.readAsDataURL(file);
        });

        const imgs = [await loadImg(f1), await loadImg(f2), await loadImg(f3)];
        const bw = 886, bh = 378, x = (1181-bw)/2, gap = (1772-4*bh)/5;

        for(let i=0; i<4; i++) {
            let y = gap + i*(bh+gap);
            ctx.drawImage(imgs[0], x, y, bw/3, bh);
            ctx.drawImage(imgs[1], x+bw/3, y, bw/3, bh);
            ctx.drawImage(imgs[2], x+2*bw/3, y, bw/3, bh);
            ctx.fillStyle = "yellow"; ctx.fillRect(x+bw/3, y+bh-70, bw/3, 45);
            ctx.fillStyle = "black"; ctx.font = "bold 26px Arial"; ctx.textAlign = "center";
            ctx.fillText(txt, 1181/2, y+bh-38);
        }
        document.getElementById('preview-img').src = can.toDataURL('image/jpeg', 0.9);
    }

    function saveImage() {
        const src = document.getElementById('preview-img').src;
        if(!src) return alert("Hãy tạo ảnh trước!");
        const a = document.createElement('a');
        a.href = src; a.download = "ket_qua.jpg"; a.click();
    }

    function exportExcel() {
        const file = document.getElementById('xl-tpl').files[0];
        if(!file) return alert("Vui lòng chọn file mẫu!");
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const map = { 'B7':'b7', 'C8':'c8', 'C9':'c9', 'B11':'b11', 'E9':'e9', 'E12':'e12', 'C13':'c13', 'C15':'c15', 'D25':'d25', 'B19':'b19', 'G21':'g21' };
            for(let cell in map) {
                const val = document.getElementById(map[cell]).value;
                if(val) { if(!ws[cell]) ws[cell] = {t:'s'}; ws[cell].v = val; }
            }
            XLSX.writeFile(wb, activeMod + ".xlsx");
        };
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
