<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMK CENTER - HỆ THỐNG NGHIỆP VỤ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0f1416; --card: #1c252a; --text: #e1e8eb; --accent: #00a8ff; --green: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* MÀN HÌNH ĐĂNG NHẬP */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1c252a 0%, #0f1416 100%);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-box {
            background: var(--card); padding: 40px; border-radius: 15px;
            border: 1px solid var(--accent); width: 100%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }

        /* GIAO DIỆN CHÍNH (ẨN KHI CHƯA ĐĂNG NHẬP) */
        #main-wrapper { display: none; }
        .sidebar { background: var(--card); border-right: 1px solid #333; width: 250px; height: 100vh; position: fixed; padding: 20px 15px; }
        .main-view { margin-left: 250px; padding: 30px; width: calc(100% - 250px); min-height: 100vh; }
        .nav-link { color: #95a5a6; padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 500; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        .module-page { display: none; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #444; animation: fadeIn 0.3s ease; }
        .module-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .field-wrapper { display: none; margin-bottom: 12px; }
        .form-label { font-size: 11px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .form-control { background: #263238; border: 1px solid #37474f; color: white; font-size: 14px; }
        .section-header { color: var(--green); border-bottom: 1px solid #37474f; padding-bottom: 5px; margin: 20px 0 10px 0; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h3 class="text-warning mb-4">BMK CENTER LOGIN</h3>
        <input type="text" id="user" class="form-control mb-3 p-3" placeholder="Tài khoản">
        <input type="password" id="pass" class="form-control mb-4 p-3" placeholder="Mật khẩu">
        <button onclick="checkLogin()" class="btn btn-primary w-100 fw-bold p-2">ĐĂNG NHẬP HỆ THỐNG</button>
        <p id="login-err" class="text-danger mt-3" style="display:none">Sai tài khoản hoặc mật khẩu!</p>
    </div>
</div>

<div id="main-wrapper">
    <div class="sidebar">
        <h4 class="text-center text-warning mb-4">BMK CENTER</h4>
        <div class="nav flex-column">
            <a class="nav-link active" onclick="switchTab('home')">🏠 TRANG CHỦ</a>
            <a class="nav-link" onclick="switchTab('ghep-anh')">🖼️ GHÉP ẢNH</a>
            <a class="nav-link" onclick="switchTab('data-form', 'LẬP HỒ SƠ', 'Laphs.xlsm')">📝 LẬP HỒ SƠ</a>
            <a class="nav-link" onclick="switchTab('data-form', 'CHUYỂN TRẠI', 'Chuyentrai.xlsm')">🚚 CHUYỂN TRẠI</a>
            <a class="nav-link" onclick="switchTab('data-form', 'THI HÀNH ÁN', 'THA.xlsm')">⚖️ THI HÀNH ÁN</a>
        </div>
    </div>

    <div class="main-view">
        <div id="home" class="module-page active">
            <h3>XIN CHÀO!</h3><hr><p>Hệ thống đã sẵn sàng với đầy đủ nhãn thông tin khớp 100% bản cũ.</p>
        </div>

        <div id="ghep-anh" class="module-page">
            <h4>🖼️ GHÉP ẢNH DCB - BMK 3.0</h4>
            <div class="row mt-3">
                <div class="col-md-5">
                    <label class="form-label">Chọn ảnh 1</label><input type="file" id="f1" class="form-control mb-2">
                    <label class="form-label">Chọn ảnh 2</label><input type="file" id="f2" class="form-control mb-2">
                    <label class="form-label">Chọn ảnh 3</label><input type="file" id="f3" class="form-control mb-3">
                    <label class="form-label">Nội dung in (Số hiệu - Họ tên)</label>
                    <input type="text" id="ga-txt" class="form-control mb-4">
                    <button onclick="doGhepAnh()" class="btn btn-primary w-100 mb-2">TẠO ẢNH</button>
                    <button onclick="saveImage()" class="btn btn-success w-100">💾 LƯU ẢNH</button>
                </div>
                <div class="col-md-7 text-center">
                    <canvas id="canvas" style="display:none"></canvas>
                    <img id="preview-img" src="" style="max-width:100%; border-radius:8px;">
                </div>
            </div>
        </div>

        <div id="data-form" class="module-page">
            <h4 id="form-title">NHẬP THÔNG TIN</h4>
            <div class="row g-2 mt-3">
                <div class="section-header">Thông tin nghiệp vụ</div>
                <div class="col-md-4 field-wrapper" id="w-b7"><label class="form-label">Họ và tên</label><input type="text" id="b7" class="form-control"></div>
                <div class="col-md-4 field-wrapper" id="w-c8"><label class="form-label">Tên gọi khác</label><input type="text" id="c8" class="form-control"></div>
                <div class="col-md-4 field-wrapper" id="w-c9"><label class="form-label">Ngày tháng năm sinh</label><input type="text" id="c9" class="form-control"></div>
                <div class="col-md-8 field-wrapper" id="w-b11"><label class="form-label">Đăng ký HKTT</label><input type="text" id="b11" class="form-control"></div>
                <div class="col-md-4 field-wrapper" id="w-c12"><label class="form-label">Dân tộc</label><input type="text" id="c12" class="form-control"></div>
                <div class="col-md-4 field-wrapper" id="w-e12"><label class="form-label">Số hiệu đối tượng</label><input type="text" id="e12" class="form-control"></div>
                <div class="col-md-4 field-wrapper" id="w-c4"><label class="form-label">C4</label><input type="text" id="c4" class="form-control"></div>
                <div class="col-md-12 field-wrapper" id="w-c13"><label class="form-label">Hành vi phạm tội</label><input type="text" id="c13" class="form-control"></div>
                <div class="col-md-4 field-wrapper" id="w-e9"><label class="form-label">Mức án
