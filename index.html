<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHẦN MỀM GHÉP ẢNH DCB - BMK 3.0</title>
    <style>
        :root {
            --bg-color: #1E272E;     /* $COLOR_BG [cite: 1] */
            --panel-color: #2F3640;  /* $COLOR_PANEL [cite: 1] */
            --primary: #4CAF50;      /* $COLOR_PRIMARY [cite: 1] */
            --accent: #00A8FF;       /* $COLOR_ACCENT [cite: 1] */
            --text: #F5F6FA;         /* $COLOR_TEXT [cite: 1] */
            --subtext: #A4B0BE;      /* $COLOR_SUBTEXT [cite: 1] */
        }
        body { background: var(--bg-color); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 900px; background: var(--panel-color); padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: var(--text); margin-bottom: 30px; }
        .group { border: 1px solid var(--subtext); padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .group-title { font-weight: bold; margin-bottom: 10px; color: var(--text); }
        input[type="file"], input[type="text"] { width: 100%; padding: 8px; margin: 5px 0; border-radius: 4px; border: none; }
        .actions { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        button { padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        #btnCreate { background: var(--primary); }
        #btnPrint { background: var(--accent); }
        #status { margin-top: 15px; color: var(--subtext); font-size: 0.9em; }
        #canvasPreview { margin-top: 20px; max-width: 100%; border: 1px solid var(--subtext); display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>PHẦN MỀM GHÉP ẢNH DCB - BMK 3.0</h2> <div class="group">
        <div class="group-title">CHỌN ẢNH</div> <input type="file" id="img1" accept="image/*">
        <input type="file" id="img2" accept="image/*">
        <input type="file" id="img3" accept="image/*">
    </div>

    <div class="group">
        <div class="group-title">THÔNG TIN IN</div> <label>Số + Tên:</label>
        <input type="text" id="inputText" placeholder="Nhập nội dung...">
    </div>

    <div class="actions">
        <button id="btnCreate">TẠO ẢNH</button> <button id="btnPrint">IN ẢNH</button> </div>

    <div id="status">Sẵn sàng</div> <canvas id="mainCanvas"></canvas>
    <img id="canvasPreview" alt="Preview">
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    // Hàm load ảnh từ input
    const loadImage = (input) => {
        return new Promise((resolve) => {
            if (!input.files[0]) resolve(null);
            const img = new Image();
            img.onload = () => resolve(img);
            img.src = URL.createObjectURL(input.files[0]);
        });
    };

    document.getElementById('btnCreate').onclick = async () => {
        const i1 = await loadImage(document.getElementById('img1'));
        const i2 = await loadImage(document.getElementById('img2'));
        const i3 = await loadImage(document.getElementById('img3'));
        const text = document.getElementById('inputText').value;

        if (!i1 || !i2 || !i3) {
            alert("Chưa chọn đủ ảnh"); // 
            return;
        }

        // Kích thước chuẩn từ mã AutoIt 
        canvas.width = 1181;
        canvas.height = 1772;

        // Vẽ nền trắng 
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const bw = 886; // 
        const bh = 378; // 
        const gap = (canvas.height - 4 * bh) / 5; // 
        const x = (canvas.width - bw) / 2; // 

        // Vẽ 4 hàng card 
        for (let i = 0; i < 4; i++) {
            const y = gap + i * (bh + gap);
            const iw = bw / 3;

            // Vẽ 3 ảnh thành phần 
            ctx.drawImage(i1, x, y, iw, bh);
            ctx.drawImage(i2, x + iw, y, iw, bh);
            ctx.drawImage(i3, x + 2 * iw, y, iw, bh);

            // Vẽ khung chữ (vàng, chữ đen) 
            const textY = y + bh - 70;
            ctx.fillStyle = "#FFFF00";
            ctx.fillRect(x + iw, textY, iw, 45);

            ctx.fillStyle = "#000000";
            ctx.font = "bold 26px Times New Roman";
            ctx.textAlign = "center";
            ctx.fillText(text, x + iw + (iw / 2), textY + 32);
        }

        // Hiển thị preview
        const preview = document.getElementById('canvasPreview');
        preview.src = canvas.toDataURL('image/jpeg');
        preview.style.display = "block";
        status.innerText = "Đã tạo ảnh thành công"; // [cite: 5]
    };

    document.getElementById('btnPrint').onclick = () => {
        const dataUrl = canvas.toDataURL('image/jpeg');
        if (!dataUrl) return alert("Chưa có ảnh để in"); // 
        
        const win = window.open('', '_blank');
        win.document.write(`<img src="${dataUrl}" style="width:100%" onload="window.print();window.close()">`);
        status.innerText = "Đã gửi lệnh in"; // [cite: 5]
    };
</script>
</body>
</html>
