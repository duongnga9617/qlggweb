<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG QUẢN LÝ TỔNG HỢP - BMK CENTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0f1416; --card: #1c252a; --text: #e1e8eb; --accent: #00a8ff; --green: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        .sidebar { background: var(--card); border-right: 1px solid #333; width: 250px; height: 100vh; position: fixed; padding: 20px 15px; }
        .main-view { margin-left: 250px; padding: 30px; width: calc(100% - 250px); min-height: 100vh; }
        .nav-link { color: #95a5a6; padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        .module-page { display: none; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #444; }
        .module-page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        .field-wrapper { display: none; margin-bottom: 12px; }
        .form-label { font-size: 11px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .form-control { background: #263238; border: 1px solid #37474f; color: white; font-size: 14px; }
        .form-control:focus { background: #37474f; color: white; border-color: var(--accent); box-shadow: none; }
        .section-header { color: var(--green); border-bottom: 1px solid #37474f; padding-bottom: 5px; margin: 20px 0 15px 0; font-weight: bold; font-size: 14px; }
        #preview-img { max-width: 100%; border: 4px solid #111; border-radius: 10px; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center text-warning mb-4">BMK CENTER</h4>
    <div class="nav flex-column">
        <div class="nav-link active" onclick="switchTab('home')">🏠 TRANG CHỦ</div>
        <div class="nav-link" onclick="switchTab('ghep-anh')">🖼️ GHÉP ẢNH (3.0)</div>
        <div class="nav-link" onclick="switchTab('data-form', 'LẬP HỒ SƠ', 'Laphs.xlsm')">📝 LẬP HỒ SƠ</div>
        <div class="nav-link" onclick="switchTab('data-form', 'CHUYỂN TRẠI', 'Chuyentrai.xlsm')">🚚 CHUYỂN TRẠI</div>
        <div class="nav-link" onclick="switchTab('data-form', 'THI HÀNH ÁN', 'THA.xlsm')">⚖️ THI HÀNH ÁN</div>
    </div>
</div>

<div class="main-view">
    <div id="home" class="module-page active">
        <h2>HỆ THỐNG QUẢN LÝ NGHIỆP VỤ</h2>
        <hr>
        <p>Tên các trường thông tin đã được đồng bộ 100% </p>
    </div>

    <div id="ghep-anh" class="module-page">
        <h4>🖼️ PHẦN MỀM GHÉP ẢNH DCB - BMK 3.0</h4>
        <div class="row mt-3">
            <div class="col-md-5">
                <label class="form-label">Chọn ảnh thứ nhất</label><input type="file" id="f1" class="form-control mb-2" accept="image/*">
                <label class="form-label">Chọn ảnh thứ hai</label><input type="file" id="f2" class="form-control mb-2" accept="image/*">
                <label class="form-label">Chọn ảnh thứ ba</label><input type="file" id="f3" class="form-control mb-3" accept="image/*">
                <label class="form-label">Nội dung in (Số hiệu - Họ tên)</label>
                <input type="text" id="ga-txt" class="form-control mb-4" placeholder="Ví dụ: 1234 - NGUYỄN VĂN A">
                <button onclick="doGhepAnh()" class="btn btn-primary w-100 mb-2 fw-bold">TẠO ẢNH</button>
                <button onclick="saveImage()" class="btn btn-success w-100 fw-bold">💾 LƯU ẢNH VỀ MÁY</button>
            </div>
            <div class="col-md-7 text-center">
                <canvas id="canvas" style="display:none"></canvas>
                <img id="preview-img" src="" alt="Chưa có ảnh">
            </div>
        </div>
    </div>

    <div id="data-form" class="module-page">
        <h4 id="form-title">NHẬP THÔNG TIN ĐỐI TƯỢNG</h4>
        <div class="row g-2 mt-3">
            <div class="section-header">Thông tin định danh</div>
            <div class="col-md-4 field-wrapper" id="w-b7"><label class="form-label">Họ và tên</label><input type="text" id="b7" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c8"><label class="form-label">Tên gọi khác</label><input type="text" id="c8" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c9"><label class="form-label">Ngày tháng năm sinh</label><input type="text" id="c9" class="form-control"></div>
            <div class="col-md-8 field-wrapper" id="w-b11"><label class="form-label">Đăng ký HKTT</label><input type="text" id="b11" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c12"><label class="form-label">Dân tộc</label><input type="text" id="c12" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-e12"><label class="form-label">Số hiệu đối tượng</label><input type="text" id="e12" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c4"><label class="form-label">Tiêu đề (C4)</label><input type="text" id="c4" class="form-control"></div>

            <div class="section-header">Thông tin pháp lý</div>
            <div class="col-md-12 field-wrapper" id="w-c13"><label class="form-label">Hành vi phạm tội</label><input type="text" id="c13" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-e9"><label class="form-label">Mức án</label><input type="text" id="e9" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c14"><label class="form-label">Bắt ngày</label><input type="text" id="c14" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c15"><label class="form-label">Số hiệu Lệnh/QĐ</label><input type="text" id="c15" class="form-control"></div>
            <div class="col-md-6 field-wrapper" id="w-c16"><label class="form-label">Cơ quan ra lệnh</label><input type="text" id="c16" class="form-control"></div>
            <div class="col-md-6 field-wrapper" id="w-d25"><label class="form-label">Quyết định thi hành án</label><input type="text" id="d25" class="form-control"></div>
            <div class="col-md-12 field-wrapper" id="w-c18"><label class="form-label">Thông tin kèm theo (C18)</label><input type="text" id="c18" class
