<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMK CENTER - DỤNG CỤ GHÉP ẢNH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0f1416; --card: #1c252a; --text: #e1e8eb; --accent: #00a8ff; --green: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; }
        
        /* ĐĂNG NHẬP */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1c252a 0%, #0f1416 100%);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-box {
            background: var(--card); padding: 40px; border-radius: 15px;
            border: 1px solid var(--accent); width: 380px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        /* GIAO DIỆN CHÍNH */
        #main-wrapper { display: none; padding: 40px 20px; }
        .app-container { max-width: 1000px; margin: auto; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #444; }
        .form-label { font-size: 13px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .form-control { background: #263238; border: 1px solid #37474f; color: white; margin-bottom: 10px; }
        .form-control:focus { background: #37474f; color: white; border-color: var(--accent); box-shadow: none; }
        
        #preview-container {
            border: 2px dashed #444; border-radius: 10px; min-height: 400px;
            display: flex; align-items: center; justify-content: center; background: #0b1012;
        }
        #preview-img { max-width: 100%; max-height: 600px; display: none; border-radius: 4px; }
        .header-title { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 25px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h4 class="text-warning mb-4">BMK CENTER LOGIN</h4>
        <input type="text" id="user" class="form-control p-3" placeholder="Tài khoản">
        <input type="password" id="pass" class="form-control p-3" placeholder="Mật khẩu">
        <button onclick="checkLogin()" class="btn btn-primary w-100 fw-bold p-2 mt-2">ĐĂNG NHẬP</button>
        <p id="login-err" class="text-danger mt-3" style="display:none">Sai tài khoản hoặc mật khẩu!</p>
    </div>
</div>

<div id="main-wrapper">
    <div class="app-container">
        <div class="d-flex justify-content-between align-items-center header-title">
            <h4 class="m-0">🖼️ PHẦN MỀM GHÉP ẢNH DCB 3.0</h4>
            <button onclick="location.reload()" class="btn btn-outline-danger btn-sm">ĐĂNG XUẤT</button>
        </div>
        
        <div class="row">
            <div class="col-md-5">
                <div class="mb-4">
                    <label class="form-label">Chọn 3 ảnh thành phần</label>
                    <input type="file" id="f1" class="form-control" accept="image/*">
                    <input type="file" id="f2" class="form-control" accept="image/*">
                    <input type="file" id="f3" class="form-control" accept="image/*">
                </div>

                <div class="mb-4">
                    <label class="form-label">Thông tin in (Số hiệu - Họ tên)</label>
                    <input type="text" id="ga-txt" class="form-control p-3" placeholder="Ví dụ: 9999 - NGUYỄN VĂN A">
                </div>

                <button onclick="doGhepAnh()" class="btn btn-primary w-100 mb-2 py-3 fw-bold">TẠO ẢNH NGAY</button>
                <button onclick="saveImage()" class="btn btn-success w-100 py-3 fw-bold">💾 LƯU ẢNH VỀ MÁY</button>
            </div>

            <div class="col-md-7">
                <div id="preview-container">
                    <span id="placeholder-text" class="text-secondary">Ảnh xem trước sẽ hiển thị tại đây</span>
                    <canvas id="canvas" style="display:none"></canvas>
                    <img id="preview-img" src="" alt="Kết quả">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Kiểm tra đăng nhập
    function checkLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "quangninh" && p === "113113@") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'block';
        } else {
            document.getElementById('login-err').style.display = 'block';
        }
    }

    // Nhấn Enter để đăng nhập
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
            checkLogin();
        }
    });

    // 2. Logic Ghép Ảnh
    async function doGhepAnh() {
        const can = document.getElementById('canvas'), ctx = can.getContext('2d');
        const txt = document.getElementById('ga-txt').value;
        const f = [document.getElementById('f1'), document.getElementById('f2'), document.getElementById('f3')];
        
        if (!f[0].files[0] || !f[1].files[0] || !f[2].files[0]) {
            return alert("Vui lòng chọn đủ 3 ảnh chân dung!");
        }

        // Kích thước chuẩn in ảnh (10x15cm tại 300dpi tương đương 1181x1772 pixels)
        can.width = 1181; 
        can.height = 1772;
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, can.width, can.height);

        try {
            const imgs = await Promise.all(f.map(i => new Promise((res, rej) => {
                const r = new FileReader();
                r.onload = e => {
                    const img = new Image();
                    img.onload = () => res(img);
                    img.onerror = rej;
                    img.src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            })));

            // Vẽ 4 hàng
            const bw = 886, bh = 378; // Chiều rộng và cao của một khối 3 ảnh
            const xOffset = (can.width - bw) / 2;
            const gap = (can.height - (4 * bh)) / 5;

            for(let i = 0; i < 4; i++) {
                let y = gap + i * (bh + gap);
                
                // Vẽ 3 ảnh trên 1 dòng
                ctx.drawImage(imgs[0], xOffset, y, bw/3, bh);
                ctx.drawImage(imgs[1], xOffset + bw/3, y, bw/3, bh);
                ctx.drawImage(imgs[2], xOffset + 2*bw/3, y, bw/3, bh);

                // Vẽ dải băng vàng hiển thị tên/số hiệu
                ctx.fillStyle = "yellow";
                ctx.fillRect(xOffset + bw/3, y + bh - 70, bw/3, 45);

                // Ghi chữ
                ctx.fillStyle = "black";
                ctx.font = "bold 26px Arial";
                ctx.textAlign = "center";
                ctx.fillText(txt.toUpperCase(), can.width / 2, y + bh - 38);
            }

            // Hiển thị kết quả
            const preview = document.getElementById('preview-img');
            preview.src = can.toDataURL('image/jpeg', 0.95);
            preview.style.display = 'block';
            document.getElementById('placeholder-text').style.display = 'none';

        } catch (err) {
            alert("Lỗi xử lý ảnh: " + err.message);
        }
    }

    // 3. Lưu ảnh
    function saveImage() {
        const src = document.getElementById('preview-img').src;
        if(!src || src === "") return alert("Hãy tạo ảnh trước khi lưu!");
        
        const name = document.getElementById('ga-txt').value || "Anh_Ghep_DCB";
        const link = document.createElement('a');
        link.href = src;
        link.download = name + ".jpg";
        link.click();
    }
</script>

</body>
</html>
