<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Xử Lý Ảnh BMK</title>
    <style>
        :root {
            --bg: #1E272E; --panel: #2F3640; --primary: #4CAF50;
            --accent: #00A8FF; --text: #F5F6FA; --subtext: #A4B0BE;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Login Style */
        #login-box { background: var(--panel); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-login { background: var(--primary); color: white; margin-top: 10px; }

        /* Main App Style */
        #main-app { display: none; width: 95%; max-width: 900px; background: var(--panel); padding: 25px; border-radius: 12px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--subtext); padding-bottom: 10px; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 6px; background: transparent; color: var(--subtext); border: 1px solid var(--subtext); }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        .tool-content { display: none; }
        .tool-content.active { display: block; }
        
        .group-box { border: 1px solid #444; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .label-title { display: block; font-weight: bold; margin-bottom: 10px; color: var(--accent); }
        
        .row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .file-info { font-size: 0.85em; color: var(--subtext); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .btn-tool { background: var(--accent); color: white; width: auto; padding: 10px 20px; }
        .btn-create { background: var(--primary); font-size: 1.1em; height: 50px; }
        .btn-orange { background: #E67E22; height: 50px; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color: var(--accent)">BMK SYSTEM</h2>
        <input type="text" id="username" placeholder="Tài khoản">
        <input type="password" id="password" placeholder="Mật khẩu">
        <button class="btn-login" onclick="checkLogin()">ĐĂNG NHẬP</button>
        <p id="login-err" style="color: #ff4757; font-size: 0.8em; margin-top: 10px; visibility: hidden;">Sai thông tin đăng nhập!</p>
    </div>

    <div id="main-app">
        <div class="nav-tabs">
            <button class="tab active" onclick="switchTab(0)">GHÉP ẢNH 3 TẤM (3.0)</button>
            <button class="tab" onclick="switchTab(1)">TẠO ẢNH THẺ (2.0)</button>
            <button onclick="location.reload()" style="margin-left: auto; width: 80px; background: #e84118; color: white; padding: 5px;">Thoát</button>
        </div>

        <div id="tool1" class="tool-content active">
            <div class="group-box">
                <span class="label-title">CHỌN 3 ẢNH NGUỒN</span>
                <div class="row">
                    <button class="btn-tool" onclick="document.getElementById('img1').click()">Chọn ảnh 1</button>
                    <span id="txt-img1" class="file-info">Chưa chọn ảnh</span>
                    <input type="file" id="img1" hidden onchange="updateLabel(1)">
                </div>
                <div class="row">
                    <button class="btn-tool" onclick="document.getElementById('img2').click()">Chọn ảnh 2</button>
                    <span id="txt-img2" class="file-info">Chưa chọn ảnh</span>
                    <input type="file" id="img2" hidden onchange="updateLabel(2)">
                </div>
                <div class="row">
                    <button class="btn-tool" onclick="document.getElementById('img3').click()">Chọn ảnh 3</button>
                    <span id="txt-img3" class="file-info">Chưa chọn ảnh</span>
                    <input type="file" id="img3" hidden onchange="updateLabel(3)">
                </div>
            </div>
            <div class="group-box">
                <span class="label-title">THÔNG TIN IN</span>
                <input type="text" id="card-text" placeholder="Nhập Số + Tên..." style="color: black;">
            </div>
            <button class="btn-create" onclick="processBMK3()">TẠO ẢNH GHÉP</button>
        </div>

        <div id="tool2" class="tool-content">
            <div class="group-box">
                <span class="label-title">CHỌN ẢNH CẦN LÀM THẺ</span>
                <div class="row">
                    <button class="btn-tool" onclick="document.getElementById('img-single').click()">Duyệt ảnh</button>
                    <span id="txt-img-single" class="file-info">Chưa chọn ảnh</span>
                    <input type="file" id="img-single" hidden onchange="updateLabel('single')">
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="btn-create" onclick="processPhotoCard('3x4')">TẠO ẢNH 3x4</button>
                <button class="btn-orange" onclick="processPhotoCard('4x6')">TẠO ẢNH 4x6</button>
            </div>
        </div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <script>
        // 1. Xử lý Đăng nhập
        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            // Thay đổi tài khoản/mật khẩu tại đây
            if(u === "admin" && p === "123456") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                document.getElementById('login-err').style.visibility = 'visible';
            }
        }

        // 2. Chuyển Tab
        function switchTab(idx) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tool-content');
            tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
            contents.forEach((c, i) => c.classList.toggle('active', i === idx));
        }

        function updateLabel(id) {
            const input = document.getElementById(id === 'single' ? 'img-single' : 'img' + id);
            document.getElementById('txt-img-' + id).innerText = input.files[0].name;
        }

        // 3. Logic Xử lý ảnh BMK 3.0 (Ghép 3 tấm) [cite: 1, 6, 7]
        async function processBMK3() {
            const files = [
                document.getElementById('img1').files[0],
                document.getElementById('img2').files[0],
                document.getElementById('img3').files[0]
            ];
            const text = document.getElementById('card-text').value;

            if (files.some(f => !f)) return alert("Vui lòng chọn đủ 3 ảnh!");

            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1181; canvas.height = 1772; // Kích thước chuẩn [cite: 7]
            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, 1181, 1772);

            const imgs = await Promise.all(files.map(f => loadImage(f)));
            
            const bw = 886, bh = 378, gap = (1772 - 4 * bh) / 5, x = (1181 - bw) / 2;
            const iw = bw / 3;

            for (let i = 0; i < 4; i++) {
                let drawY = gap + i * (bh + gap);
                // Vẽ 3 ảnh [cite: 6]
                imgs.forEach((img, idx) => {
                    ctx.drawImage(img, x + idx * iw, drawY, iw, bh);
                });
                // Vẽ khung text màu vàng [cite: 6]
                ctx.fillStyle = "yellow";
                ctx.fillRect(x + iw, drawY + bh - 70, iw, 45);
                ctx.fillStyle = "black";
                ctx.font = "bold 26px 'Times New Roman'";
                ctx.textAlign = "center";
                ctx.fillText(text, x + iw + (iw/2), drawY + bh - 38);
            }
            downloadCanvas("Ghep_3_Anh");
        }

        // 4. Logic Tạo ảnh thẻ 2.0 (3x4 và 4x6) [cite: 17, 18, 19, 22, 23, 24]
        async function processPhotoCard(type) {
            const file = document.getElementById('img-single').files[0];
            if (!file) return alert("Vui lòng chọn ảnh!");

            const img = await loadImage(file);
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1181; canvas.height = 1772;
            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, 1181, 1772);

            const targetW = (type === '3x4') ? 354 : 472; [cite: 18]
            const targetH = (type === '3x4') ? 472 : 709; [cite: 19]

            // Crop trung tâm [cite: 20, 21]
            const ratio = targetW / targetH;
            let sW = img.width, sH = img.height, sX = 0, sY = 0;
            if ((img.width / img.height) > ratio) {
                sW = img.height * ratio; sX = (img.width - sW) / 2;
            } else {
                sH = img.width / ratio; sY = (img.height - sH) / 2;
            }

            if (type === '3x4') { // Lưới 3x3 [cite: 22, 23]
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        ctx.drawImage(img, sX, sY, sW, sH, 45 + c * 394, 130 + r * 522, 354, 472);
                    }
                }
            } else { // Lưới 2x2 [cite: 24]
                const posX = [65, 635], posY = [85, 935];
                for (let i = 0; i < 2; i++) {
                    for (let j = 0; j < 2; j++) {
                        ctx.drawImage(img, sX, sY, sW, sH, posX[i], posY[j], 472, 709);
                    }
                }
            }
            downloadCanvas("Anh_The_" + type);
        }

        // Utilities
        function loadImage(file) {
            return new Promise(res => {
                const img = new Image();
                img.onload = () => res(img);
                img.src = URL.createObjectURL(file);
            });
        }

        function downloadCanvas(name) {
            const link = document.createElement('a');
            link.download = name + '_' + Date.now() + '.jpg';
            link.href = document.getElementById('mainCanvas').toDataURL("image/jpeg", 0.9);
            link.click();
        }
    </script>
</body>
</html>
