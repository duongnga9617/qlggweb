<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG TIỆN ÍCH QLGG - BMK FULL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #12181B; --card: #1E272E; --text: #ECF0F1; --accent: #00A8FF; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { background: var(--card); border-right: 1px solid #333; height: 100vh; padding: 15px; }
        .nav-link { color: #bdc3c7; padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        .main-view { height: 100vh; overflow-y: auto; padding: 25px; padding-bottom: 100px; }
        .module-page { display: none; background: var(--card); padding: 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .module-page.active { display: block; }
        .form-label { font-size: 12px; color: #00A8FF; font-weight: bold; margin-bottom: 2px; }
        .form-control { background: #2c3e50; border: 1px solid #444; color: white; font-size: 14px; padding: 5px 10px; }
        .form-control:focus { background: #34495e; color: white; border-color: var(--accent); box-shadow: none; }
        .section-title { border-left: 4px solid #4CAF50; padding-left: 10px; margin: 20px 0 10px 0; color: #4CAF50; font-size: 16px; text-transform: uppercase; }
        hr { border-color: #444; }
        .sticky-actions { position: sticky; bottom: -25px; background: var(--card); padding: 15px; border-top: 1px solid #444; margin-top: 20px; z-index: 100; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar">
            <h5 class="text-center text-warning mb-4">QLGG CENTER</h5>
            <div class="nav flex-column">
                <div class="nav-link active" onclick="switchTab('home')">🏠 TRANG CHỦ</div>
                <div class="nav-link" onclick="switchTab('ghep-anh')">🖼️ GHÉP ẢNH (3.0)</div>
                <div class="nav-link" onclick="switchTab('lap-hs')">📝 LẬP HỒ SƠ</div>
                <div class="nav-link" onclick="switchTab('chuyen-trai')">🚚 CHUYỂN TRẠI</div>
                <div class="nav-link" onclick="switchTab('tha')">⚖️ THI HÀNH ÁN</div>
            </div>
        </div>

        <div class="col-md-9 col-lg-10 main-view">
            
            <div id="home" class="module-page active">
                <h2>HỆ THỐNG TIỆN ÍCH TỔNG HỢP</h2>
                <p class="text-secondary">Giữ nguyên tính năng từ bộ mã AutoIt gốc.</p>
            </div>

            <div id="ghep-anh" class="module-page">
                <h4>🖼️ GHÉP ẢNH DCB - BMK 3.0</h4>
                <div class="row mt-3">
                    <div class="col-md-4">
                        <label class="form-label">Ảnh 1, 2, 3</label>
                        <input type="file" id="ga-1" class="form-control mb-2">
                        <input type="file" id="ga-2" class="form-control mb-2">
                        <input type="file" id="ga-3" class="form-control mb-2">
                        <label class="form-label">Thông tin Số + Tên</label>
                        <input type="text" id="ga-txt" class="form-control mb-3">
                        <button onclick="doGhepAnh()" class="btn btn-success w-100 mb-2">TẠO ẢNH</button>
                        <button onclick="window.print()" class="btn btn-outline-light w-100">IN TRANG</button>
                    </div>
                    <div class="col-md-8 text-center">
                        <canvas id="c" style="display:none"></canvas>
                        <img id="p" class="img-fluid border" style="max-height: 70vh;">
                    </div>
                </div>
            </div>

            <div id="data-form" class="module-page">
                <h4 id="form-title">FORM NHẬP LIỆU</h4>
                
                <div class="row g-2">
                    <div class="section-title">Thông tin cơ bản</div>
                    <div class="col-md-4"><label class="form-label">Họ và tên (B7/C7)</label><input type="text" id="b7" class="form-control"></div>
                    <div class="col-md-4"><label class="form-label">Tên gọi khác (C8)</label><input type="text" id="c8" class="form-control"></div>
                    <div class="col-md-4"><label class="form-label">Ngày sinh (C9)</label><input type="text" id="c9" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Dân tộc (C12)</label><input type="text" id="c12" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Mức án (E9)</label><input type="text" id="e9" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Dòng C4 (Chỉ LapHS)</label><input type="text" id="c4" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Số hiệu (E12)</label><input type="text" id="e12" class="form-control"></div>
                    
                    <div class="col-md-12"><label class="form-label">Đăng ký HKTT (B11/C11)</label><input type="text" id="b11" class="form-control"></div>

                    <div class="section-title">Chi tiết vụ án</div>
                    <div class="col-md-12"><label class="form-label">Hành vi phạm tội (C13)</label><input type="text" id="c13" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Bắt ngày (C14)</label><input type="text" id="c14" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Lệnh/QĐ số (C15)</label><input type="text" id="c15" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Cơ quan ra lệnh (C16)</label><input type="text" id="c16" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">QĐ Thi hành án (D25)</label><input type="text" id="d25" class="form-control"></div>

                    <div class="section-title">Thông tin bổ sung (Dòng 19 - 22)</div>
                    <div class="col-md-2"><label class="form-label">B19</label><input type="text" id="b19" class="form-control"></div>
                    <div class="col-md-2"><label class="form-label">C19</label><input type="text" id="c19" class="form-control"></div>
                    <div class="col-md-2"><label class="form-label">D19</label><input type="text" id="d19" class="form-control"></div>
                    <div class="col-md-2"><label class="form-label">E19</label><input type="text" id="e19" class="form-control"></div>
                    <div class="col-md-2"><label class="form-label">F19</label><input type="text" id="f19" class="form-control"></div>
                    <div class="col-md-2"><label class="form-label">G19</label><input type="text" id="g19" class="form-control"></div>

                    <div class="col-md-3"><label class="form-label">E20 (LapHS)</label><input type="text" id="e20" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">F20 (LapHS)</label><input type="text" id="f20" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">G20 (LapHS)</label><input type="text" id="g20" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">G21 (CTrai)</label><input type="text" id="g21" class="form-control"></div>
                </div>

                <div class="sticky-actions shadow-lg rounded">
                    <label class="text-info small mb-1 d-block">Bước 1: Chọn file mẫu tương ứng (.xlsm)</label>
                    <div class="input-group">
                        <input type="file" id="tpl" class="form-control" accept=".xlsm,.xlsx">
                        <button onclick="exportExcelFull()" class="btn btn-primary px-4">XUẤT FILE EXCEL</button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    let activeMod = 'home';
    const ids = ['b7','c8','c9','b11','c12','c13','c14','c15','c16','e9','c4','e12','d25','b19','c19','d19','e19','f19','g19','e20','f20','g20','g21'];

    function switchTab(t) {
        document.querySelectorAll('.module-page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(['lap-hs','chuyen-trai','tha'].includes(t)) {
            document.getElementById('data-form').classList.add('active');
            document.getElementById('form-title').innerText = t.toUpperCase().replace('-',' ');
            activeMod = t;
        } else {
            document.getElementById(t).classList.add('active');
        }
        event.currentTarget.classList.add('active');
    }

    // GHÉP ẢNH

        const can = document.getElementById('c'), ctx = can.getContext('2d');
        const f = [document.getElementById('ga-1').files[0], document.getElementById('ga-2').files[0], document.getElementById('ga-3').files[0]];
        const txt = document.getElementById('ga-txt').value;

            const img = new Image(); img.onload=()=>r(img); img.src=URL.createObjectURL(i);
        })));

        for(let i=0
