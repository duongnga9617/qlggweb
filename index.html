<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Xử Lý Ảnh BMK 3.0</title>
    <style>
        :root {
            --bg: #1E272E; --panel: #2F3640; --primary: #4CAF50;
            --accent: #00A8FF; --text: #F5F6FA; --subtext: #A4B0BE;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Login Box */
        #login-box { background: var(--panel); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; box-sizing: border-box; background: #fff; color: #000; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-login { background: var(--primary); color: white; margin-top: 10px; font-size: 16px; }
        .btn-login:hover { background: #45a049; }

        /* Main App Style */
        #main-app { display: none; width: 95%; max-width: 900px; background: var(--panel); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--subtext); padding-bottom: 15px; }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 6px; background: transparent; color: var(--subtext); border: 1px solid var(--subtext); width: auto; }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        .tool-content { display: none; }
        .tool-content.active { display: block; }
        
        .group-box { border: 1px solid #444; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: rgba(0,0,0,0.2); }
        .label-title { display: block; font-weight: bold; margin-bottom: 10px; color: var(--accent); text-transform: uppercase; font-size: 0.9em; }
        
        .row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .file-info { font-size: 0.85em; color: var(--subtext); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }
        
        .btn-tool { background: var(--accent); color: white; width: auto; padding: 8px 15px; font-size: 0.9em; min-width: 120px; }
        .btn-create { background: var(--primary); font-size: 1.1em; height: 55px; margin-top: 10px; }
        .btn-orange { background: #E67E22; height: 55px; margin-top: 10px; }
        
        #status-bar { margin-top: 20px; font-size: 0.85em; color: var(--subtext); border-top: 1px solid #444; padding-top: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color: var(--accent); margin-bottom: 5px;">BMK PHOTO SYSTEM</h2>
        <p style="color: var(--subtext); font-size: 0.85em; margin-bottom: 20px;">Hệ thống tạo ảnh DCB</p>
        <input type="text" id="username" class="input-field" placeholder="Tài khoản" autocomplete="off">
        <input type="password" id="password" class="input-field" placeholder="Mật khẩu">
        <button type="button" id="loginBtn" class="btn-login">ĐĂNG NHẬP</button>
        <p id="login-err" style="color: #ff4757; font-size: 0.85em; margin-top: 15px; display: none;">Sai tài khoản hoặc mật khẩu!</p>
    </div>

    <div id="main-app">
        <div class="nav-tabs">
            <button type="button" class="tab active" onclick="switchTab(0)">GHÉP ẢNH 3 TẤM (3.0)</button>
            <button type="button" class="tab" onclick="switchTab(1)">TẠO ẢNH THẺ (2.0)</button>
            <button type="button" onclick="location.reload()" style="margin-left: auto; width: 100px; background: #e84118; color: white; padding: 5px; font-size: 0.8em;">Đăng xuất</button>
        </div>

        <div id="tool1" class="tool-content active">
            <div class="group-box">
                <span class="label-title">Chọn 3 ảnh nguồn</span>
                <div class="row">
                    <button type="button" class="btn-tool" onclick="document.getElementById('img1').click()">Chọn ảnh 1</button>
                    <span id="txt-img1" class="file-info">Chưa chọn ảnh</span>
                    <input type="file" id="img1" hidden onchange="updateLabel(1)">
                </div>
                <div class="row">
                    <button type="button" class="btn-tool" onclick="document.getElementById('img2').click()">Chọn ảnh 2</button>
                    <span id="txt-img2" class="file-info">Chưa chọn ảnh</span>
                    <input type="file" id="img2" hidden onchange="updateLabel(2)">
                </div>
                <div class="row">
                    <button type="button" class="btn-tool" onclick="document.getElementById('img3').click()">Chọn ảnh 3</button>
                    <span id="txt-img3" class="file-info">Chưa chọn ảnh</span>
                    <input type="file" id="img3" hidden onchange="updateLabel(3)">
                </div>
            </div>
            <div class="group-box">
                <span class="label-title">Thông tin in (Dùng làm tên file)</span>
                <input type="text" id="card-text" class="input-field" placeholder="Nhập Số + Tên..." style="margin: 0;">
            </div>
            <button type="button" class="btn-create" onclick="processBMK3()">TẠO ẢNH GHÉP (10x15)</button>
        </div>

        <div id="tool2" class="tool-content">
            <div class="group-box">
                <span class="label-title">Chọn ảnh làm thẻ</span>
                <div class="row">
                    <button type="button" class="btn-tool" onclick="document.getElementById('img-single').click()">Duyệt ảnh</button>
                    <span id="txt-img-single" class="file-info">Chưa chọn ảnh</span>
                    <input type="file" id="img-single" hidden onchange="updateLabel('single')">
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button type="button" class="btn-create" style="background: #2ecc71;" onclick="processPhotoCard('3x4')">TẠO ẢNH 3x4</button>
                <button type="button" class="btn-orange" onclick="processPhotoCard('4x6')">TẠO ẢNH 4x6</button>
            </div>
        </div>

        <div id="status-bar">Trạng thái: <span id="stt-text" style="color: #fff;">Sẵn sàng</span></div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <script>
        // Xử lý đăng nhập bằng Event Listener để tránh lỗi không phản hồi
        document.getElementById('loginBtn').addEventListener('click', function() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('login-err');

            if(u === "quangninh" && p === "113113@") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                err.style.display = 'block';
            }
        });

        // Hỗ trợ nhấn Enter
        document.addEventListener('keydown', function(e) {
            if(e.key === 'Enter' && document.getElementById('login-box').style.display !== 'none') {
                document.getElementById('loginBtn').click();
            }
        });

        function switchTab(idx) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tool-content');
            tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
            contents.forEach((c, i) => c.classList.toggle('active', i === idx));
        }

        function updateLabel(id) {
            const input = document.getElementById(id === 'single' ? 'img-single' : 'img' + id);
            const label = document.getElementById(id === 'single' ? 'txt-img-single' : 'txt-img' + id);
            if(input.files[0]) {
                label.innerText = input.files[0].name;
                label.style.color = "#4CAF50";
            }
        }

        async function processBMK3() {
            const files = [
                document.getElementById('img1').files[0],
                document.getElementById('img2').files[0],
                document.getElementById('img3').files[0]
            ];
            const text = document.getElementById('card-text').value;

            if (files.some(f => !f)) return alert("Vui lòng chọn đủ 3 ảnh!");

            document.getElementById('stt-text').innerText = "Đang ghép ảnh...";
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 1181; canvas.height = 1772;
            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, 1181, 1772);

            const imgs = await Promise.all(files.map(f => loadImage(f)));
            
            const bw = 886, bh = 378, gap = (1772 - 4 * bh) / 5, x = (1181 - bw) / 2;
            const iw = bw / 3;

            for (let i = 0; i < 4; i++) {
                let drawY = gap + i * (bh + gap);
                imgs.forEach((img, idx) => {
                    ctx.drawImage(img, x + idx * iw, drawY, iw, bh);
                });
                
                if(text) {
                    ctx.fillStyle = "yellow";
                    ctx.fillRect(x + iw, drawY + bh - 70, iw, 45);
                    ctx.fillStyle = "black";
                    ctx.font = "bold 26px 'Times New Roman'";
                    ctx.textAlign = "center";
                    ctx.fillText(text, x + iw + (iw/2), drawY + bh - 38);
                }
            }
            // Đặt tên file theo thông tin in
            const fileName = text ? text.replace(/[/\\?%*:|"<>]/g, '-') : "Ghep_3_Anh";
            downloadCanvas(fileName);
            document.getElementById('stt-text').innerText = "Đã lưu: " + fileName;
        }

        async function processPhotoCard(type) {
            const file = document.getElementById('img-single').files[0];
            if (!file) return alert("Vui lòng chọn ảnh!");

            document.getElementById('stt-text').innerText = "Đang tạo ảnh thẻ...";
            const img = await loadImage(file);
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 1181; canvas.height = 1772;
            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, 1181, 1772);

            const targetW = (type === '3x4') ? 354 : 472;
            const targetH = (type === '3x4') ? 472 : 709;

            const ratio = targetW / targetH;
            let sW = img.width, sH = img.height, sX = 0, sY = 0;
            if ((img.width / img.height) > ratio) {
                sW = img.height * ratio; sX = (img.width - sW) / 2;
            } else {
                sH = img.width / ratio; sY = (img.height - sH) / 2;
            }

            if (type === '3x4') {
                const marginX = 45, marginY = 130, spX = 40, spY = 50;
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        ctx.drawImage(img, sX, sY, sW, sH, marginX + c * (targetW + spX), marginY + r * (targetH + spY), targetW, targetH);
                    }
                }
            } else {
                const posX = [65, 635], posY = [85, 935];
                for (let i = 0; i < 2; i++) {
                    for (let j = 0; j < 2; j++) {
                        ctx.drawImage(img, sX, sY, sW, sH, posX[i], posY[j], targetW, targetH);
                    }
                }
            }
            downloadCanvas("Anh_The_" + type);
            document.getElementById('stt-text').innerText = "Xong!";
        }

        function loadImage(file) {
            return new Promise(res => {
                const img = new Image();
                img.onload = () => res(img);
                img.src = URL.createObjectURL(file);
            });
        }

        function downloadCanvas(name) {
            const link = document.createElement('a');
            link.download = name + '.jpg';
            link.href = document.getElementById('mainCanvas').toDataURL("image/jpeg", 0.95);
            link.click();
        }
    </script>
</body>
</html>
