<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMK PHOTO SYSTEM ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --primary: #10b981; 
            --accent: #3b82f6; --danger: #ef4444; --text: #f8fafc;
            --subtext: #94a3b8; --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* --- LOGIN BOX --- */
        #login-box {
            background: var(--panel); padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); width: 360px;
            text-align: center; border: 1px solid var(--border);
        }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { font-size: 12px; color: var(--subtext); margin-bottom: 5px; display: block; }
        
        .input-field {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: #0f172a; color: #fff; font-size: 15px; box-sizing: border-box;
        }

        .btn-main {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        /* --- APP INTERFACE --- */
        #main-app {
            display: none; width: 95%; max-width: 900px; background: var(--panel);
            border-radius: 20px; border: 1px solid var(--border); overflow: hidden;
        }

        .header {
            padding: 20px 30px; background: rgba(0,0,0,0.2);
            display: flex; justify-content: space-between; align-items: center;
        }

        .nav-tabs { display: flex; gap: 10px; padding: 15px 30px; background: rgba(0,0,0,0.1); }
        
        .tab {
            padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 600;
            background: transparent; color: var(--subtext); border: 1px solid var(--border);
        }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .content { padding: 30px; }

        .card {
            background: rgba(15, 23, 42, 0.4); border: 1px solid var(--border);
            padding: 20px; border-radius: 15px; margin-bottom: 20px;
        }

        .file-row {
            display: grid; grid-template-columns: 140px 1fr; align-items: center;
            gap: 15px; margin-bottom: 12px;
        }

        .btn-browse {
            background: var(--border); color: white; padding: 8px;
            border-radius: 6px; font-size: 13px; cursor: pointer; border: none;
        }

        .file-name {
            font-size: 13px; color: var(--subtext); font-style: italic;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .file-name.active { color: var(--primary); font-weight: 600; font-style: normal; }

        .footer-stt {
            padding: 10px 30px; background: #0f172a; font-size: 12px;
            color: var(--subtext); border-top: 1px solid var(--border);
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="login-box">
        <h1 style="color:var(--primary); margin:0; font-size: 28px;">BMK</h1>
        <p style="color:var(--subtext); margin-bottom: 30px;">Hệ Thống Xử Lý Ảnh</p>
        
        <div class="input-group">
            <label>Tài khoản</label>
            <input type="text" id="username" class="input-field" placeholder="Nhập tài khoản của bạn">
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" class="input-field" placeholder="Nhập mật khẩu">
        </div>
        
        <button type="button" class="btn-main btn-primary" onclick="doLogin()">ĐĂNG NHẬP</button>
        <p id="err" style="color:var(--danger); font-size:13px; display:none; margin-top:15px;">Tài khoản hoặc mật khẩu không chính xác!</p>
    </div>

    <div id="main-app">
        <div class="header">
            <span style="font-weight:800; font-size:18px;">BMK PHOTO PRO 3.0</span>
            <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:5px 12px; border-radius:5px; cursor:pointer; font-size:12px;">Đăng xuất</button>
        </div>

        <div class="nav-tabs">
            <button class="tab active" onclick="tab(0)">TẠO ẢNH DCB</button>
            <button class="tab" onclick="tab(1)">TẠO ẢNH THẺ</button>
        </div>

        <div class="content">
            <div id="t0">
                <div class="card">
                    <div class="file-row">
                        <button class="btn-browse" onclick="document.getElementById('f1').click()">Chọn ảnh 1</button>
                        <span id="s1" class="file-name">Chưa chọn tệp...</span>
                        <input type="file" id="f1" hidden onchange="showFn(1)">
                    </div>
                    <div class="file-row">
                        <button class="btn-browse" onclick="document.getElementById('f2').click()">Chọn ảnh 2</button>
                        <span id="s2" class="file-name">Chưa chọn tệp...</span>
                        <input type="file" id="f2" hidden onchange="showFn(2)">
                    </div>
                    <div class="file-row">
                        <button class="btn-browse" onclick="document.getElementById('f3').click()">Chọn ảnh 3</button>
                        <span id="s3" class="file-name">Chưa chọn tệp...</span>
                        <input type="file" id="f3" hidden onchange="showFn(3)">
                    </div>
                </div>
                <div class="card" style="padding: 10px 20px;">
                    <label style="font-size:12px; color:var(--accent); font-weight:800;">THÔNG TIN IN (SỐ + TÊN)</label>
                    <input type="text" id="info" class="input-field" style="margin-top:8px;" placeholder="Ví dụ: 01 NGUYỄN VĂN A">
                </div>
                <button class="btn-main btn-primary" onclick="runBMK()">XUẤT FILE </button>
            </div>

            <div id="t1" style="display:none">
                <div class="card">
                    <div class="file-row">
                        <button class="btn-browse" onclick="document.getElementById('fs').click()">Duyệt ảnh thẻ</button>
                        <span id="ss" class="file-name">Chưa chọn tệp...</span>
                        <input type="file" id="fs" hidden onchange="showFn('s')">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <button class="btn-main" style="background:#0284c7; color:white;" onclick="runCard('3x4')">XUẤT 3x4</button>
                    <button class="btn-main" style="background:#d97706; color:white;" onclick="runCard('4x6')">XUẤT 4x6</button>
                </div>
            </div>
        </div>

        <div class="footer-stt">Trạng thái: <span id="stt" style="color:#fff">Sẵn sàng</span></div>
    </div>

    <canvas id="cv"></canvas>

    <script>
        // Các thông tin tài khoản vẫn được kiểm tra ngầm, nhưng không hiển thị lên giao diện nhập liệu
        function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            // Tài khoản/Mật khẩu vẫn là quangninh / 113113@
            if(u === "quangninh" && p === "113113@") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }

        function tab(i) {
            document.querySelectorAll('.tab').forEach((b,idx)=> b.classList.toggle('active', idx===i));
            document.getElementById('t0').style.display = i===0 ? 'block' : 'none';
            document.getElementById('t1').style.display = i===1 ? 'block' : 'none';
        }

        function showFn(id) {
            const input = document.getElementById(id === 's' ? 'fs' : 'f'+id);
            const span = document.getElementById(id === 's' ? 'ss' : 's'+id);
            if(input.files[0]) {
                span.innerText = "✓ " + input.files[0].name;
                span.classList.add('active');
            }
        }

        function loadImg(f) {
            return new Promise(r => {
                const i = new Image();
                i.onload = () => r(i);
                i.src = URL.createObjectURL(f);
            });
        }

        async function runBMK() {
            const f1 = document.getElementById('f1').files[0];
            const f2 = document.getElementById('f2').files[0];
            const f3 = document.getElementById('f3').files[0];
            const txt = document.getElementById('info').value;

            if(!f1 || !f2 || !f3) return alert("Vui lòng chọn đủ 3 ảnh!");

            document.getElementById('stt').innerText = "Đang xử lý...";
            const cv = document.getElementById('cv');
            const ctx = cv.getContext('2d');
            cv.width = 1181; cv.height = 1772;
            ctx.fillStyle = "#fff"; ctx.fillRect(0,0,1181,1772);

            const i1 = await loadImg(f1);
            const i2 = await loadImg(f2);
            const i3 = await loadImg(f3);

            const bw = 886, bh = 378, gap = (1772 - 4 * bh) / 5;
            const x = (1181 - bw) / 2, iw = bw / 3;

            for(let i=0; i<4; i++) {
                let y = gap + i * (bh + gap);
                ctx.drawImage(i1, x, y, iw, bh);
                ctx.drawImage(i2, x + iw, y, iw, bh);
                ctx.drawImage(i3, x + 2*iw, y, iw, bh);

                if(txt) {
                    ctx.fillStyle = "yellow";
                    ctx.fillRect(x + iw, y + bh - 70, iw, 45);
                    ctx.fillStyle = "black";
                    ctx.font = "bold 26px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(txt, x + iw + (iw/2), y + bh - 38);
                }
            }
            save(txt || "BMK_Output");
        }

        async function runCard(type) {
            const f = document.getElementById('fs').files[0];
            if(!f) return alert("Chưa chọn ảnh!");

            const img = await loadImg(f);
            const cv = document.getElementById('cv');
            const ctx = cv.getContext('2d');
            cv.width = 1181; cv.height = 1772;
            ctx.fillStyle = "#fff"; ctx.fillRect(0,0,1181,1772);

            const tw = type==='3x4'? 354:472, th = type==='3x4'? 472:709;
            const ratio = tw/th;
            let sw = img.width, sh = img.height, sx=0, sy=0;
            if((sw/sh) > ratio) { sw = sh*ratio; sx=(img.width-sw)/2; }
            else { sh = sw/ratio; sy=(img.height-sh)/2; }

            if(type==='3x4') {
                for(let r=0; r<3; r++) {
                    for(let c=0; c<3; c++) {
                        ctx.drawImage(img, sx, sy, sw, sh, 45 + c*394, 130 + r*522, 354, 472);
                    }
                }
            } else {
                const px=[65,635], py=[85,935];
                for(let i=0; i<2; i++) {
                    for(let j=0; j<2; j++) {
                        ctx.drawImage(img, sx, sy, sw, sh, px[i], py[j], 472, 709);
                    }
                }
            }
            save("Anh_The_" + type);
        }

        function save(name) {
            const a = document.createElement('a');
            a.download = name + ".jpg";
            a.href = document.getElementById('cv').toDataURL("image/jpeg", 0.9);
            a.click();
            document.getElementById('stt').innerText = "Đã xuất file thành công!";
        }
    </script>
</body>
</html>
