<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMK Photo Tool 2.0 - Web Version</title>
    <style>
        /* Giao diện mô phỏng theo mã nguồn AutoIt [cite: 2, 3] */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #E0E4E8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 480px;
            background-color: #F4F6F8; /* $f4f6f8 [cite: 2] */
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #2C3E50; /* $2C3E50 [cite: 3] */
            font-size: 14pt;
            font-weight: 800;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .section-label {
            text-align: left;
            font-size: 9pt;
            color: #333;
            margin-bottom: 5px;
            display: block;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            pointer-events: none; /* Chỉ hiển thị tên file */
        }

        .btn-browse {
            background-color: #3498DB; /* $3498DB [cite: 4] */
            color: white;
            border: none;
            padding: 5px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }

        .action-group {
            display: flex;
            gap: 15px;
        }

        .btn-action {
            flex: 1;
            height: 60px;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 10pt;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-3x4 { background-color: #2ECC71; } /* $2ECC71 [cite: 5] */
        .btn-4x6 { background-color: #E67E22; } /* $E67E22 [cite: 5] */

        .btn-action:hover { opacity: 0.9; }

        #photoCanvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phần mềm tạo ảnh thẻ</h2>

    <label class="section-label">Chọn ảnh</label>
    <div class="input-group">
        <input type="text" id="fileNameDisplay" placeholder="Chưa có ảnh nào được chọn...">
        <button class="btn-browse" onclick="document.getElementById('fileInput').click()">Duyệt</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none" onchange="updateFileName()">
    </div>

    <label class="section-label">Chọn loại ảnh cần tạo</label>
    <div class="action-group">
        <button class="btn-action btn-3x4" onclick="processPhoto('3x4')">Tạo ảnh 3x4</button>
        <button class="btn-action btn-4x6" onclick="processPhoto('4x6')">Tạo ảnh 4x6</button>
    </div>
</div>

<canvas id="photoCanvas"></canvas>

<script>
    function updateFileName() {
        const fileInput = document.getElementById('fileInput');
        const display = document.getElementById('fileNameDisplay');
        if (fileInput.files.length > 0) {
            display.value = fileInput.files[0].name;
        }
    }

    function processPhoto(type) {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) {
            alert("Vui lòng chọn ảnh trước!"); [cite: 8]
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                generateGrid(img, type);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(fileInput.files[0]);
    }

    function generateGrid(img, type) {
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');

        // Thông số Canvas (Khổ giấy 10x15cm tại 300dpi) [cite: 9]
        const canvasW = 1181;
        const canvasH = 1772;
        canvas.width = canvasW;
        canvas.height = canvasH;

        // Xóa trắng nền giống _GDIPlus_GraphicsClear [cite: 11]
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, canvasW, canvasH);

        // Thông số ảnh thẻ [cite: 10, 11]
        const targetW = (type === "3x4") ? 354 : 472;
        const targetH = (type === "3x4") ? 472 : 709;

        // Logic tính toán Crop trung tâm (Tương ứng mã AutoIt) [cite: 12, 13]
        const targetRatio = targetW / targetH;
        const imgRatio = img.width / img.height;
        let srcX = 0, srcY = 0, srcW = img.width, srcH = img.height;

        if (imgRatio > targetRatio) {
            srcW = img.height * targetRatio;
            srcX = (img.width - srcW) / 2;
        } else {
            srcH = img.width / targetRatio;
            srcY = (img.height - srcH) / 2;
        }

        // Vẽ ảnh lên lưới [cite: 14, 15, 16]
        if (type === "3x4") {
            const marginX = 45, marginY = 130;
            const spacingX = 40, spacingY = 50;
            for (let row = 0; row <= 2; row++) {
                for (let col = 0; col <= 2; col++) {
                    const drawX = marginX + (col * (targetW + spacingX));
                    const drawY = marginY + (row * (targetH + spacingY));
                    ctx.drawImage(img, srcX, srcY, srcW, srcH, drawX, drawY, targetW, targetH);
                }
            }
        } else {
            const posX = [65, 635], posY = [85, 935];
            for (let i = 0; i < 2; i++) {
                for (let j = 0; j < 2; j++) {
                    ctx.drawImage(img, srcX, srcY, srcW, srcH, posX[i], posY[j], targetW, targetH);
                }
            }
        }

        // Xuất file và tải về (Thay thế ShellExecute) [cite: 17, 19]
        const link = document.createElement('a');
        const now = new Date();
        const timestamp = now.getHours().toString() + now.getMinutes() + now.getSeconds();
        link.download = `Anh_${type}_${timestamp}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 0.95);
        link.click();
    }
</script>

</body>
</html>
