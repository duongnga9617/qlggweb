<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG TIỆN ÍCH QLGG - BMK CENTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #12181B; --card: #1E272E; --text: #ECF0F1; --accent: #00A8FF; --green: #2ecc71; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; margin: 0; }
        .sidebar { background: var(--card); border-right: 1px solid #333; height: 100vh; position: fixed; width: 240px; padding: 15px; z-index: 1000; }
        .main-view { margin-left: 240px; padding: 30px; min-height: 100vh; }
        .nav-link { color: #bdc3c7; padding: 12px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        .module-page { display: none; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #444; margin-bottom: 50px; }
        .module-page.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .form-label { font-size: 13px; color: var(--accent); font-weight: bold; margin-top: 10px; display: block; }
        .form-control { background: #2c3e50; border: 1px solid #444; color: white; font-size: 14px; }
        .section-title { color: var(--green); border-left: 4px solid var(--green); padding-left: 10px; margin: 20px 0 10px 0; font-size: 1rem; text-transform: uppercase; }
        #preview-img { max-width: 100%; border: 2px solid #333; border-radius: 8px; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-action { font-weight: bold; padding: 10px; transition: 0.3s; }
        /* Ẩn các trường không thuộc module */
        .field-wrapper { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center text-warning mb-4">QLGG CENTER</h4>
    <div class="nav flex-column">
        <div class="nav-link active" onclick="switchTab('home')">🏠 TRANG CHỦ</div>
        <div class="nav-link" onclick="switchTab('ghep-anh')">🖼️ GHÉP ẢNH (3.0)</div>
        <div class="nav-link" onclick="switchTab('data-form', 'LẬP HỒ SƠ')">📝 LẬP HỒ SƠ</div>
        <div class="nav-link" onclick="switchTab('data-form', 'CHUYỂN TRẠI')">🚚 CHUYỂN TRẠI</div>
        <div class="nav-link" onclick="switchTab('data-form', 'THI HÀNH ÁN')">⚖️ THI HÀNH ÁN</div>
    </div>
</div>

<div class="main-view">
    <div id="home" class="module-page active">
        <h2>HỆ THỐNG TIỆN ÍCH TỔNG HỢP</h2>
        <hr border-color="#444">
        <p class="text-secondary">Vui lòng chọn chức năng ở menu bên trái để bắt đầu.</p>
    </div>

    <div id="ghep-anh" class="module-page">
        <h4>🖼️ CÔNG CỤ GHÉP ẢNH DCB - BMK 3.0</h4>
        <div class="row mt-3">
            <div class="col-md-5">
                <label class="form-label">Tấm ảnh 1 (Trái)</label><input type="file" id="f1" class="form-control mb-2">
                <label class="form-label">Tấm ảnh 2 (Giữa)</label><input type="file" id="f2" class="form-control mb-2">
                <label class="form-label">Tấm ảnh 3 (Phải)</label><input type="file" id="f3" class="form-control mb-3">
                <label class="form-label">Nội dung in (Số - Tên)</label>
                <input type="text" id="ga-txt" class="form-control mb-4" placeholder="Vd: 1234 - NGUYỄN VĂN A">
                <button onclick="doGhepAnh()" class="btn btn-primary w-100 mb-2 btn-action">TẠO ẢNH</button>
                <button onclick="saveImage()" class="btn btn-success w-100 btn-action">💾 LƯU ẢNH VỀ MÁY</button>
            </div>
            <div class="col-md-7 text-center">
                <canvas id="main-canvas" style="display:none"></canvas>
                <img id="preview-img" src="" alt="Xem trước ảnh kết quả">
            </div>
        </div>
    </div>

    <div id="data-form" class="module-page">
        <h4 id="form-title">THÔNG TIN CHI TIẾT</h4>
        <div class="row g-2 mt-3">
            <div class="col-md-4 field-wrapper" id="w-b7"><label class="form-label">Họ và tên (B7/C7)</label><input type="text" id="b7" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c8"><label class="form-label">Tên gọi khác (C8)</label><input type="text" id="c8" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c9"><label class="form-label">Ngày sinh (C9)</label><input type="text" id="c9" class="form-control"></div>
            <div class="col-md-8 field-wrapper" id="w-b11"><label class="form-label">Đăng ký HKTT (B11/C11)</label><input type="text" id="b11" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c12"><label class="form-label">Dân tộc (C12)</label><input type="text" id="c12" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-e9"><label class="form-label">Mức án (E9)</label><input type="text" id="e9" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-e12"><label class="form-label">Số hiệu (E12)</label><input type="text" id="e12" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c4"><label class="form-label">Tiêu đề phụ (C4)</label><input type="text" id="c4" class="form-control"></div>
            
            <div class="col-md-12 field-wrapper" id="w-c13"><label class="form-label">Hành vi phạm tội (C13)</label><input type="text" id="c13" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c14"><label class="form-label">Bắt ngày (C14)</label><input type="text" id="c14" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c15"><label class="form-label">Số hiệu Lệnh/QĐ (C15)</label><input type="text" id="c15" class="form-control"></div>
            <div class="col-md-4 field-wrapper" id="w-c16"><label class="form-label">Cơ quan ra lệnh (C16)</label><input type="text" id="c16" class="form-control"></div>
            <div class="col-md-6 field-wrapper" id="w-d25"><label class="form-label">QĐ Thi hành án (D25)</label><input type="text" id="d25" class="form-control"></div>
            <div class="col-md-6 field-wrapper" id="w-c18"><label class="form-label">Dòng C18</label><input type="text" id="c18" class="form-control"></div>

            <div class="section-title field-wrapper w-100" id="title-19">Thông tin bổ sung (Dòng 19-22)</div>
            <div class="col-md-2 field-wrapper" id="w-b19"><label class="form-label">B19</label><input type="text" id="b19" class="form-control"></div>
            <div class="col-md-2 field-wrapper" id="w-c19"><label class="form-label">C19</label><input type="text" id="c19" class="form-control"></div>
            <div class="col-md-2 field-wrapper" id="w-d19"><label class="form-label">D19</label><input type="text" id="d19" class="form-control"></div>
            <div class="col-md-2 field-wrapper" id="w-e19"><label class="form-label">E19</label><input type="text" id="e19" class="form-control"></div>
            <div class="col-md-2 field-wrapper" id="w-f19"><label class="form-label">F19</label><input type="text" id="f19" class="form-control"></div>
            <div class="col-md-2 field-wrapper" id="w-g19"><label class="form-label">G19</label><input type="text" id="g19" class="form-control"></div>

            <div class="col-md-3 field-wrapper" id="w-e20"><label class="form-label">E20</label><input type="text" id="e20" class="form-control"></div>
            <div class="col-md-3 field-wrapper" id="w-f20"><label class="form-label">F20</label><input type="text" id="f20" class="form-control"></div>
            <div class="col-md-3 field-wrapper" id="w-g20"><label class="form-label">G20</label><input type="text" id="g20" class="form-control"></div>
            <div class="col-md-3 field-wrapper" id="w-g21"><label class="form-label">G21</label><input type="text" id="g21" class="form-control"></div>
            <div class="col-md-3 field-wrapper" id="w-e21"><label class="form-label">E21</label><input type="text" id="e21" class="form-control"></div>
            <div class="col-md-3 field-wrapper" id="w-e22"><label class="form-label">E22</label><input type="text" id="e22" class="form-control"></div>
            <div class="col-md-3 field-wrapper" id="w-f22"><label class="form-label">F22</label><input type="text" id="f22" class="form-control"></div>

            <div class="col-md-12 mt-4 p-4 border border-info rounded bg-dark">
                <label class="form-label text-white">Bước cuối: Chọn file Excel mẫu để xuất dữ liệu</label>
                <div class="input-group">
                    <input type="file" id="excel-tpl" class="form-control" accept=".xlsm,.xlsx">
                    <button onclick="exportExcel()" class="btn btn-info px-4">XUẤT FILE</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
    // Cấu hình hiển thị trường theo module (Đúng theo AutoIt)
    const configs = {
        'LẬP HỒ SƠ': ['b7','c8','c9','b11','c12','e9','c13','c14','c15','c4','c18','e20','f20','g20','e22','f22'],
        'CHUYỂN TRẠI': ['b7','c8','c9','b11','c12','e9','e12','c1
